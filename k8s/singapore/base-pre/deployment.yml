apiVersion: apps/v1
kind: Deployment
metadata:
  name: table-search-pre
  namespace: pre
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: table-search-pre
      version: v1
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: table-search-pre
        version: v1
    spec:
      containers:
        - image: >-
            crpi-hytqalx0cm8oqxr4.cn-hangzhou.personal.cr.aliyuncs.com/atom-pre/table-search-pre:20251027184459
          imagePullPolicy: IfNotPresent
          env:
            - name: aliyun_logs_table-search-pre
              value: stdout
            - name: ENVIRONMENT
              value: pre
            - name: NACOS_ENDPOINT
              value: 'mse-9996a1110-nacos-ans.mse.aliyuncs.com:8848'
            - name: NACOS_NAMESPACE
              value: 918b7045-4408-474d-8cb5-541ff94e5584
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 15
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: 80
            timeoutSeconds: 5
          name: table-search-pre
          ports:
            - containerPort: 80
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 5
            successThreshold: 1
            tcpSocket:
              port: 80
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "100m"
              memory: "32Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      imagePullSecrets:
        - name: registry-ali-hangzhou
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 120
