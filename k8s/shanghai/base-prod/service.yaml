apiVersion: v1
kind: Service
metadata:
  namespace: shprod
  name: table-search-prod-service
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  ports:
    - name: tcp80
      port: 80
      protocol: TCP
      targetPort: 80
  selector:
    app: table-search-prod
    version: v1
  sessionAffinity: None
  type: ClusterIP
