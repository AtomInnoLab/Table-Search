version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: dlm_postgres
    environment:
      POSTGRES_USER: dlm_user
      POSTGRES_PASSWORD: dlm_pass_dev
      POSTGRES_DB: literature_matrix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dlm_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dlm_network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: dlm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - dlm_network

  # MinIO (本地S3替代)
  minio:
    image: minio/minio:latest
    container_name: dlm_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - dlm_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  dlm_network:
    driver: bridge
