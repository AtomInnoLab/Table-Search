name: Get Docker Tag from Canary Workflow
description: Get docker_tag artifact from the latest successful canary workflow run
inputs:
  workflow:
    description: 'Workflow file name to query'
    required: false
    default: 'prod-canary.yml'
  repository:
    description: 'Repository to query (owner/repo)'
    required: true
  github-token:
    description: 'GitHub token for API access'
    required: true
outputs:
  docker_tag:
    description: 'Docker tag value from artifact'
    value: ${{ steps.set_outputs.outputs.docker_tag }}
  run_id:
    description: 'Workflow run ID'
    value: ${{ steps.set_outputs.outputs.run_id }}
  run_url:
    description: 'Workflow run URL'
    value: ${{ steps.set_outputs.outputs.run_url }}

runs:
  using: "composite"
  steps:
    - name: Get latest canary workflow run ID
      id: get_run_id
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        WORKFLOW: ${{ inputs.workflow }}
        REPOSITORY: ${{ inputs.repository }}
      run: |
        RUN_JSON=$(gh run list --repo "$REPOSITORY" --workflow="$WORKFLOW" --status=success --limit=1 --json databaseId,url)
        
        if [ -z "$RUN_JSON" ] || [ "$RUN_JSON" = "[]" ]; then
          echo "❌ 未找到成功的 canary workflow 运行记录"
          exit 1
        fi
        
        RUN_ID=$(echo "$RUN_JSON" | jq -r '.[0].databaseId')
        RUN_URL=$(echo "$RUN_JSON" | jq -r '.[0].url')
        
        if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
          echo "❌ 无法解析 workflow run ID"
          exit 1
        fi
        
        echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
        echo "run_url=$RUN_URL" >> $GITHUB_OUTPUT

    - name: Download docker_tag artifact
      uses: actions/download-artifact@v4
      with:
        name: docker_tag
        github-token: ${{ inputs.github-token }}
        repository: ${{ inputs.repository }}
        run-id: ${{ steps.get_run_id.outputs.run_id }}
        path: .

    - name: Read docker_tag and set outputs
      id: set_outputs
      shell: bash
      run: |
        DOCKER_TAG=$(cat docker_tag.txt | tr -d '\n\r')
        
        if [ -z "$DOCKER_TAG" ]; then
          echo "❌ docker_tag 为空"
          exit 1
        fi
        
        echo "docker_tag=$DOCKER_TAG" >> $GITHUB_OUTPUT
        echo "run_id=${{ steps.get_run_id.outputs.run_id }}" >> $GITHUB_OUTPUT
        echo "run_url=${{ steps.get_run_id.outputs.run_url }}" >> $GITHUB_OUTPUT
