worker_processes 1;
pid /tmp/nginx-screenshots.pid;
error_log /tmp/nginx-screenshots-error.log;

events {
    worker_connections 64;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /tmp/nginx-screenshots-access.log;

    server {
        listen 8889;
        server_name _;

        root /home/ecs-user/workspace/table-search/screenshots;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
